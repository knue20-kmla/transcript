<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 로그인 - KMLA Transcript</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md">
    <!-- 로고 -->
    <div class="text-center mb-8">
      <div class="w-20 h-20 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl mx-auto mb-4 flex items-center justify-center">
        <span class="text-white text-3xl font-bold">📚</span>
      </div>
      <h1 class="text-2xl font-black text-gray-800">관리자 로그인</h1>
      <p class="text-gray-500 text-sm mt-2">KMLA Transcript System</p>
    </div>

    <!-- 로그인 폼 -->
    <form id="loginForm" class="space-y-6">
      <!-- 아이디 -->
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">아이디</label>
        <input
          type="text"
          id="username"
          required
          class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none transition-colors"
          placeholder="관리자 아이디를 입력하세요"
        />
      </div>

      <!-- 비밀번호 -->
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">비밀번호</label>
        <input
          type="password"
          id="password"
          required
          class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none transition-colors"
          placeholder="비밀번호를 입력하세요"
        />
      </div>

      <!-- 로그인 버튼 -->
      <button
        type="submit"
        class="w-full py-3 bg-gradient-to-r from-blue-500 to-purple-600 text-white font-bold rounded-xl hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1"
      >
        로그인
      </button>
    </form>

    <!-- 오류 메시지 -->
    <div id="errorMsg" class="hidden mt-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-xl text-sm"></div>

    <!-- 메인으로 돌아가기 -->
    <div class="text-center mt-6">
      <a href="index.html" class="text-sm text-gray-500 hover:text-gray-700">← 메인 페이지로 돌아가기</a>
    </div>
  </div>

  <script>
    // 간단한 로그인 검증 (실제 프로덕션에서는 서버 인증 필요)
    const ADMIN_CREDENTIALS = {
      username: 'admin',
      password: 'kmla2025' // 실제 사용 시 변경 필요
    };

    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');

      if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
        // 로그인 성공 - 세션 저장
        sessionStorage.setItem('admin_logged_in', 'true');
        sessionStorage.setItem('admin_username', username);

        // 관리자 대시보드로 이동
        window.location.href = 'admin_dashboard.html';
      } else {
        // 로그인 실패
        errorMsg.textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
        errorMsg.classList.remove('hidden');

        setTimeout(() => {
          errorMsg.classList.add('hidden');
        }, 3000);
      }
    });
  </script>

</body>
</html>
