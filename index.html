<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KMLA 생기부 조회 시스템</title>

  <!-- React 및 Babel CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Marked.js (마크다운 렌더링) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Pretendard', 'Inter', 'sans-serif'] }
        }
      }
    }
  </script>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Pretendard', 'Inter', sans-serif;
      background: #f1f6fa;
      color: #334155;
    }

    /* 마크다운 스타일 */
    .markdown-content {
      line-height: 1.8;
      color: #1e293b;
    }
    .markdown-content h2 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1e3a8a;
      margin: 1.5rem 0 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #e0e7ff;
    }
    .markdown-content h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #2563eb;
      margin: 1rem 0 0.5rem;
    }
    .markdown-content p {
      margin: 0.75rem 0;
    }
    .markdown-content strong {
      color: #dc2626;
      font-weight: 700;
    }
    .markdown-content hr {
      margin: 1.5rem 0;
      border: none;
      border-top: 1px solid #e2e8f0;
    }
    .markdown-content ul {
      list-style: disc;
      padding-left: 1.5rem;
      margin: 0.75rem 0;
    }
    .markdown-content li {
      margin: 0.5rem 0;
    }

    /* 아코디언 애니메이션 */
    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }
    .accordion-content.open {
      max-height: 5000px;
      transition: max-height 0.5s ease-in;
    }

    /* 스크롤바 */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #e2e8f0; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }

    .desktop-sidebar { display: flex !important; }
    .mobile-menu-btn { display: none !important; }

    @media (max-width: 1100px) {
      .desktop-sidebar { display: none !important; }
      .mobile-menu-btn { display: flex !important; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// ==================== 설정 ====================
const DATA_BASE = 'https://raw.githubusercontent.com/knue20-kmla/transcript/main/data/'; // JSON 데이터 경로
const GITHUB_BASE = 'https://raw.githubusercontent.com/knue20-kmla/transcript/main/markdown/'; // 마크다운 파일 경로

// ==================== 아이콘 컴포넌트 ====================
const Ic = ({ name, size=18, cls="" }) => {
  const paths = {
    User:    { d:"M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2", d2:"M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z" },
    Bar:     { d:"M3 3v18h18", d2:"M7 16V8m5 8V5m5 11v-4" },
    Book:    { d:"M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z", d2:"M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" },
    Compass: { d:"M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z", d2:"M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z" },
    Activity:{ d:"M22 12h-4l-3 9L9 3l-3 9H2" },
    Star:    { d:"M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" },
    Search:  { d:"M21 21l-6-6m2-5a7 7 0 1 1-14 0 7 7 0 0 1 14 0" },
    Menu:    { d:"M3 12h18M3 6h18M3 18h18" },
    X:       { d:"M18 6L6 18M6 6l12 12" },
    ChevD:   { d:"M6 9l6 6 6-6" },
    Layout:  { d:"M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z" },
  };
  const p = paths[name] || { d:"" };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke="currentColor" strokeWidth="2" strokeLinecap="round"
      strokeLinejoin="round" className={cls}>
      <path d={p.d}/>{p.d2 && <path d={p.d2}/>}
    </svg>
  );
};

// ==================== 카드 컴포넌트 ====================
const Card = ({ children, title, iconName, className="" }) => (
  <div className={`bg-white border border-blue-100 shadow-sm rounded-2xl p-6 ${className}`}>
    {title && (
      <div className="flex items-center gap-3 mb-6">
        {iconName && <Ic name={iconName} size={18} cls="text-blue-500" />}
        <h3 className="m-0 text-lg font-black text-slate-800">{title}</h3>
      </div>
    )}
    {children}
  </div>
);

// ==================== 대시보드 탭 ====================
const DashboardTab = ({ studentData }) => {
  const { grades, highlights } = studentData;

  const getOverallAvgGrade = () => {
    if (!grades || grades.length === 0) return "—";
    let totalScore = 0;
    let totalCredits = 0;
    grades.forEach(g => {
      if (g.등급) {
        totalScore += g.등급 * (g.학점 || 3);
        totalCredits += (g.학점 || 3);
      }
    });
    return totalCredits > 0 ? (totalScore / totalCredits).toFixed(2) : "—";
  };

  return (
    <div className="flex flex-col gap-6">
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
        <Card className="bg-gradient-to-br from-blue-50 to-white">
          <div className="flex items-center justify-between mb-4">
            <p className="text-xs font-black text-blue-600 uppercase">전체 평균 등급</p>
            <Ic name="Bar" size={16} cls="text-blue-500" />
          </div>
          <div className="flex items-baseline gap-2">
            <p className="text-4xl font-black text-slate-800 m-0">{getOverallAvgGrade()}</p>
            <span className="text-xs font-bold text-slate-400">등급</span>
          </div>
        </Card>

        <Card className="bg-gradient-to-br from-indigo-50 to-white">
          <div className="flex items-center justify-between mb-4">
            <p className="text-xs font-black text-indigo-600 uppercase">성취도 과목</p>
            <Ic name="Activity" size={16} cls="text-indigo-500" />
          </div>
          <div className="flex items-baseline gap-2">
            <p className="text-4xl font-black text-slate-800 m-0">{grades.filter(g => g.성취도).length}</p>
            <span className="text-xs font-bold text-slate-400">과목</span>
          </div>
        </Card>
      </div>

      {highlights && highlights.length > 0 && (
        <Card title="⭐ 주요 세특 평가 표현" iconName="Star" className="border-fuchsia-200 bg-gradient-to-br from-fuchsia-50 to-white">
          <div className="flex flex-col gap-3">
            {highlights.map((h, i) => (
              <div key={i} className="p-4 bg-white rounded-xl border-l-4 border-fuchsia-500 shadow-sm">
                <p className="text-sm font-bold text-slate-800 mb-2">"{h.text}"</p>
                <span className="inline-block px-2 py-1 bg-fuchsia-50 text-fuchsia-700 text-xs font-bold rounded">
                  {h.subject}
                </span>
              </div>
            ))}
          </div>
        </Card>
      )}
    </div>
  );
};

// ==================== 성적 탭 ====================
const GradesTab = ({ studentData }) => {
  const { grades } = studentData;
  const [year, setYear] = useState("1학년");
  const [sem, setSem] = useState("1학기");

  const filtered = useMemo(() => {
    return grades.filter(g => g.학년 === year && g.학기 === sem);
  }, [grades, year, sem]);

  return (
    <Card title="성적 상세 조회" iconName="Bar">
      <div className="flex gap-2 mb-4">
        {["1학년", "2학년"].map(y => (
          <button key={y} onClick={() => setYear(y)}
            className={`px-4 py-2 rounded-full text-xs font-bold transition-all ${
              year === y ? 'bg-blue-600 text-white' : 'bg-white text-slate-500 border border-slate-200'
            }`}>{y}</button>
        ))}
      </div>
      <div className="flex gap-2 mb-6">
        {["1학기", "2학기"].map(s => (
          <button key={s} onClick={() => setSem(s)}
            className={`px-4 py-2 rounded-full text-xs font-bold transition-all ${
              sem === s ? 'bg-blue-600 text-white' : 'bg-white text-slate-500 border border-slate-200'
            }`}>{s}</button>
        ))}
      </div>

      <div className="overflow-x-auto">
        <table className="w-full text-left border-collapse">
          <thead className="bg-blue-50">
            <tr>
              <th className="p-4 text-xs font-bold text-slate-500">과목</th>
              <th className="p-4 text-xs font-bold text-slate-500 text-center">학점</th>
              <th className="p-4 text-xs font-bold text-slate-500 text-right">원점수</th>
              <th className="p-4 text-xs font-bold text-slate-500 text-right">평균</th>
              <th className="p-4 text-xs font-bold text-slate-500 text-center">등급/성취도</th>
            </tr>
          </thead>
          <tbody>
            {filtered.length > 0 ? filtered.map((g, i) => (
              <tr key={i} className="border-b hover:bg-blue-50">
                <td className="p-4 font-bold text-slate-800">{g.과목}</td>
                <td className="p-4 text-center">{g.학점 || 3}</td>
                <td className="p-4 text-right">{g.원점수 || '—'}</td>
                <td className="p-4 text-right text-slate-500">{g.평균 || '—'}</td>
                <td className="p-4 text-center">
                  {g.등급 ? (
                    <span className="inline-flex items-center justify-center w-8 h-8 rounded-lg text-white font-bold bg-blue-600">
                      {g.등급}
                    </span>
                  ) : g.성취도 ? (
                    <span className="inline-flex items-center justify-center w-8 h-8 rounded-full text-white font-bold bg-fuchsia-600">
                      {g.성취도}
                    </span>
                  ) : '—'}
                </td>
              </tr>
            )) : (
              <tr><td colSpan="5" className="p-8 text-center text-slate-400">데이터 없음</td></tr>
            )}
          </tbody>
        </table>
      </div>
    </Card>
  );
};

// ==================== 세특 탭 (마크다운) ====================
const SeteukTab = ({ studentName, subject, setSubject }) => {
  const [mdContent, setMdContent] = useState('');
  const [loading, setLoading] = useState(false);
  const [openSections, setOpenSections] = useState({});

  useEffect(() => {
    if (subject === "전체 분석") return;

    setLoading(true);
    const fileName = `${studentName}_세특_${subject}.md`;
    fetch(`${GITHUB_BASE}${fileName}`)
      .then(res => res.text())
      .then(text => {
        setMdContent(text);
        setLoading(false);
      })
      .catch(err => {
        console.error(err);
        setMdContent('# 데이터를 불러올 수 없습니다.');
        setLoading(false);
      });
  }, [studentName, subject]);

  const toggleSection = (idx) => {
    setOpenSections(prev => ({ ...prev, [idx]: !prev[idx] }));
  };

  const parsedSections = useMemo(() => {
    if (!mdContent) return [];
    const sections = mdContent.split(/\n## /).filter(s => s.trim());
    return sections.map(s => {
      const lines = s.split('\n');
      const title = lines[0].replace(/^# /, '');
      const content = lines.slice(1).join('\n');
      return { title, content };
    });
  }, [mdContent]);

  return (
    <div className="flex flex-col gap-6">
      <div className="flex flex-wrap gap-2">
        {["전체 분석", "국어", "영어", "수학", "과학", "사회", "정보", "교양"].map(s => (
          <button key={s} onClick={() => setSubject(s)}
            className={`px-4 py-2 rounded-full text-xs font-bold transition-all ${
              subject === s ? 'bg-blue-600 text-white' : 'bg-white text-slate-500 border'
            }`}>{s}</button>
        ))}
      </div>

      {subject === "전체 분석" ? (
        <Card title="전체 분석" iconName="Book">
          <p className="text-sm text-slate-600">각 과목을 선택하여 상세 기록을 확인하세요.</p>
        </Card>
      ) : (
        <Card title={`${subject} 세특 기록`} iconName="Book">
          {loading ? (
            <p className="text-center text-slate-400 py-8">불러오는 중...</p>
          ) : parsedSections.length > 0 ? (
            <div className="flex flex-col gap-3">
              {parsedSections.slice(1).map((sec, idx) => (
                <div key={idx} className="border border-blue-100 rounded-xl overflow-hidden">
                  <button
                    onClick={() => toggleSection(idx)}
                    className="w-full p-4 bg-blue-50 text-left font-bold text-slate-800 flex justify-between items-center hover:bg-blue-100 transition"
                  >
                    <span>📌 {sec.title}</span>
                    <Ic name="ChevD" size={16} cls={`transform transition-transform ${openSections[idx] ? 'rotate-180' : ''}`} />
                  </button>
                  <div className={`accordion-content ${openSections[idx] ? 'open' : ''}`}>
                    <div className="p-4 markdown-content" dangerouslySetInnerHTML={{ __html: marked.parse(sec.content) }} />
                  </div>
                </div>
              ))}
            </div>
          ) : (
            <p className="text-center text-slate-400 py-8">데이터 없음</p>
          )}
        </Card>
      )}
    </div>
  );
};

// ==================== 메인 앱 ====================
function App() {
  const [selectedStudent, setSelectedStudent] = useState("권정민");
  const [activeTab, setActiveTab] = useState("dashboard");
  const [sidebarOpen, setSidebarOpen] = useState(false);

  // 데이터
  const [students, setStudents] = useState([]);
  const [loading, setLoading] = useState(true);

  // 세특 탭
  const [seSubject, setSeSubject] = useState("전체 분석");

  useEffect(() => {
    // JSON 데이터 로드
    fetch(`${DATA_BASE}students.json`)
      .then(res => res.json())
      .then(data => {
        setStudents(data.students);
        setLoading(false);
      })
      .catch(err => {
        console.error('데이터 로드 실패:', err);
        setLoading(false);
      });
  }, []);

  const currentStudent = useMemo(() => {
    return students.find(s => s.이름 === selectedStudent) || {};
  }, [students, selectedStudent]);

  const studentData = {
    ...currentStudent,
    grades: currentStudent.성적 || [],
    highlights: currentStudent.highlights || []
  };

  const navItems = [
    { id: "dashboard", label: "대시보드", icon: "Layout" },
    { id: "grades", label: "성적 분석", icon: "Bar" },
    { id: "seteuk", label: "세특", icon: "Book" },
    { id: "career", label: "진로활동", icon: "Compass" },
    { id: "autonomous", label: "자율활동", icon: "Activity" },
    { id: "behavior", label: "행동특성", icon: "User" },
  ];

  const renderTab = () => {
    if (activeTab === "dashboard") return <DashboardTab studentData={studentData} />;
    if (activeTab === "grades") return <GradesTab studentData={studentData} />;
    if (activeTab === "seteuk") return <SeteukTab studentName={selectedStudent} subject={seSubject} setSubject={setSeSubject} />;
    return <Card title={activeTab}><p>준비 중...</p></Card>;
  };

  if (loading) {
    return (
      <div className="min-h-screen flex items-center justify-center">
        <p className="text-slate-500">데이터 로딩 중...</p>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-gradient-to-br from-slate-50 to-blue-50">
      {sidebarOpen && (
        <div onClick={() => setSidebarOpen(false)} className="fixed inset-0 bg-black/20 backdrop-blur-sm z-30" />
      )}

      <div className="flex">
        {/* Sidebar */}
        <aside className={`desktop-sidebar fixed top-0 left-0 w-72 h-screen bg-white/90 backdrop-blur-xl border-r border-blue-100 z-40 flex-col ${sidebarOpen ? 'flex' : 'hidden'}`}>
          <div className="p-6">
            <div className="flex items-center gap-3 mb-8">
              <div className="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-white font-black">K</div>
              <h1 className="text-xl font-black text-blue-900">KMLA</h1>
            </div>

            <nav className="flex flex-col gap-2">
              {navItems.map(item => (
                <button key={item.id} onClick={() => { setActiveTab(item.id); setSidebarOpen(false); }}
                  className={`flex items-center gap-3 p-3 rounded-xl text-sm font-bold transition ${
                    activeTab === item.id ? 'bg-blue-50 text-blue-700' : 'text-slate-600 hover:bg-slate-50'
                  }`}>
                  <Ic name={item.icon} size={16} />
                  {item.label}
                </button>
              ))}
            </nav>
          </div>
        </aside>

        {/* Main */}
        <main className="flex-1 md:ml-72 p-6">
          <header className="flex justify-between items-center mb-8">
            <div className="flex items-center gap-4">
              <button onClick={() => setSidebarOpen(true)} className="mobile-menu-btn p-2 bg-white rounded-lg border">
                <Ic name="Menu" size={18} />
              </button>
              <h2 className="text-2xl font-black text-slate-800">학교생활기록부 조회</h2>
            </div>

            <select value={selectedStudent} onChange={e => setSelectedStudent(e.target.value)}
              className="px-4 py-2 bg-blue-600 text-white font-bold text-sm rounded-full border-none">
              {students.map(s => (
                <option key={s.이름} value={s.이름}>{s.이름}</option>
              ))}
            </select>
          </header>

          <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div className="lg:col-span-1">
              <Card>
                <div className="flex flex-col items-center">
                  <div className="w-24 h-24 rounded-full bg-gradient-to-br from-blue-100 to-blue-200 mb-4 flex items-center justify-center overflow-hidden">
                    {currentStudent.프로필이미지URL ? (
                      <img src={currentStudent.프로필이미지URL} alt={selectedStudent} className="w-full h-full object-cover" />
                    ) : (
                      <Ic name="User" size={40} cls="text-blue-400" />
                    )}
                  </div>
                  <h3 className="text-xl font-black text-slate-800 mb-1">{selectedStudent}</h3>
                  <p className="text-xs text-blue-600 font-bold mb-4">{currentStudent.계열 || '인문사회계열'}</p>
                  <div className="grid grid-cols-2 gap-2 w-full text-xs">
                    <div className="p-2 bg-slate-50 rounded">
                      <p className="text-slate-500 mb-1">학년/반</p>
                      <p className="font-bold">{currentStudent.학년} {currentStudent.반}</p>
                    </div>
                    <div className="p-2 bg-slate-50 rounded">
                      <p className="text-slate-500 mb-1">번호</p>
                      <p className="font-bold">{currentStudent.번호 || '—'}</p>
                    </div>
                  </div>
                </div>
              </Card>
            </div>

            <div className="lg:col-span-3">
              {renderTab()}
            </div>
          </div>
        </main>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
