<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KMLA Transcript System</title>

  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Marked.js -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 다크모드 */
    body.dark {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    }

    /* 글래스모피즘 카드 */
    .glass {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    body.dark .glass {
      background: rgba(30, 30, 46, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    /* 부드러운 애니메이션 */
    .smooth-transition {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .hover-lift:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.15);
    }

    /* 그라데이션 텍스트 */
    .gradient-text {
      background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    body.dark .gradient-text {
      background: linear-gradient(135deg, #60a5fa 0%, #93c5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* 스크롤바 */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.05);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(30, 64, 175, 0.5);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(30, 64, 175, 0.8);
    }

    /* 마크다운 스타일 */
    .markdown h2 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1e40af;
      margin: 1.5rem 0 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid rgba(30, 64, 175, 0.2);
    }

    body.dark .markdown h2 {
      color: #60a5fa;
      border-bottom-color: rgba(96, 165, 250, 0.2);
    }

    .markdown p {
      line-height: 1.8;
      margin: 0.75rem 0;
      color: #374151;
    }

    body.dark .markdown p {
      color: #d1d5db;
    }

    .markdown strong {
      color: #dc2626;
      font-weight: 700;
    }

    body.dark .markdown strong {
      color: #f87171;
    }

    .markdown hr {
      margin: 2rem 0;
      border: none;
      border-top: 1px solid rgba(0, 0, 0, 0.1);
    }

    body.dark .markdown hr {
      border-top-color: rgba(255, 255, 255, 0.1);
    }

    /* 아코디언 애니메이션 */
    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .accordion-content.open {
      max-height: 5000px;
    }

    /* 탭 인디케이터 */
    .tab-indicator {
      position: absolute;
      bottom: 0;
      height: 3px;
      background: linear-gradient(90deg, #1e40af 0%, #3b82f6 100%);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 3px 3px 0 0;
    }

    /* 로딩 애니메이션 */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .animate-pulse {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    /* 버튼 호버 효과 */
    .btn-primary {
      background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
      position: relative;
      overflow: hidden;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }

    .btn-primary:hover::before {
      left: 100%;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// ==================== 설정 ====================
const DATA_BASE = 'https://raw.githubusercontent.com/knue20-kmla/transcript/main/data/';
const GITHUB_BASE = 'https://raw.githubusercontent.com/knue20-kmla/transcript/main/markdown/';

// ==================== 아이콘 ====================
const Icon = ({ name, size = 20, className = "" }) => {
  const icons = {
    sun: "M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z",
    moon: "M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z",
    menu: "M4 6h16M4 12h16M4 18h16",
    x: "M6 18L18 6M6 6l12 12",
    home: "M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6",
    chart: "M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z",
    book: "M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253",
    user: "M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z",
    search: "M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z",
    chevronDown: "M19 9l-7 7-7-7",
  };

  return (
    <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d={icons[name]} />
    </svg>
  );
};

// ==================== 컴포넌트 ====================

// 대시보드 탭
const Dashboard = ({ student }) => {
  const [achPopupOpen, setAchPopupOpen] = useState(false);

  const avgGrade = useMemo(() => {
    if (!student.성적 || student.성적.length === 0) return "—";
    let totalScore = 0, totalCredits = 0;
    student.성적.forEach(g => {
      if (g.등급) {
        totalScore += g.등급 * (g.학점 || 3);
        totalCredits += (g.학점 || 3);
      }
    });
    return totalCredits > 0 ? (totalScore / totalCredits).toFixed(2) : "—";
  }, [student]);

  const achSubjects = useMemo(() => {
    return (student.성적 || []).filter(g => g.성취도);
  }, [student]);

  const achCount = achSubjects.length;

  const achBreakdown = useMemo(() => {
    const counts = { A: 0, B: 0, C: 0 };
    achSubjects.forEach(subj => {
      const grade = subj.성취도?.toUpperCase();
      if (grade === 'A') counts.A++;
      else if (grade === 'B') counts.B++;
      else if (grade === 'C') counts.C++;
    });
    return counts;
  }, [achSubjects]);

  return (
    <div className="space-y-6">
      {/* 통계 카드 */}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div className="glass rounded-3xl p-8 hover-lift smooth-transition">
          <div className="flex items-center justify-between mb-4">
            <h3 className="text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">전체 평균 등급</h3>
            <Icon name="chart" size={24} className="text-blue-500" />
          </div>
          <div className="flex items-baseline gap-2">
            <span className="text-5xl font-black gradient-text">{avgGrade}</span>
            <span className="text-lg text-gray-400">등급</span>
          </div>
        </div>

        <div className="glass rounded-3xl p-8 hover-lift smooth-transition cursor-pointer" onClick={() => setAchPopupOpen(true)}>
          <div className="flex items-center justify-between mb-4">
            <h3 className="text-sm font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">성취도 과목</h3>
            <Icon name="book" size={24} className="text-blue-500" />
          </div>
          <div className="flex items-baseline gap-2 mb-3">
            <span className="text-5xl font-black gradient-text">{achCount}</span>
            <span className="text-lg text-gray-400">과목</span>
          </div>
          <div className="flex gap-2 flex-wrap">
            {achBreakdown.A > 0 && (
              <span className="text-xs font-bold px-2 py-1 rounded-full bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400">
                A {achBreakdown.A}개
              </span>
            )}
            {achBreakdown.B > 0 && (
              <span className="text-xs font-bold px-2 py-1 rounded-full bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400">
                B {achBreakdown.B}개
              </span>
            )}
            {achBreakdown.C > 0 && (
              <span className="text-xs font-bold px-2 py-1 rounded-full bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400">
                C {achBreakdown.C}개
              </span>
            )}
          </div>
          <p className="text-xs text-gray-400 mt-3">클릭하여 상세 보기</p>
        </div>
      </div>

      {/* 교과군별 등급 추이 */}
      <div className="glass rounded-3xl p-8">
        <h3 className="text-2xl font-bold mb-6 gradient-text flex items-center gap-2">
          📈 교과군별 등급 추이
        </h3>

        <div className="overflow-x-auto">
          <table className="w-full border-collapse">
            <thead>
              <tr className="border-b-2 border-blue-200 dark:border-blue-800">
                <th className="text-left py-4 px-4 text-sm font-bold text-gray-600 dark:text-gray-300 uppercase">과목군</th>
                <th className="text-center py-4 px-4 text-sm font-bold text-gray-600 dark:text-gray-300">1-1</th>
                <th className="text-center py-4 px-4 text-sm font-bold text-gray-600 dark:text-gray-300">1-2</th>
                <th className="text-center py-4 px-4 text-sm font-bold text-gray-600 dark:text-gray-300">2-1</th>
                <th className="text-center py-4 px-4 text-sm font-bold text-gray-600 dark:text-gray-300">2-2</th>
                <th className="text-center py-4 px-4 text-sm font-bold text-gray-600 dark:text-gray-300 w-32">추이 그래프</th>
              </tr>
            </thead>
            <tbody>
              {[
                { name: "국어", grades: [4, 3, null, null], subjects: ["국어", "국어", "", ""] },
                { name: "수학", grades: [4, 5, 5, 6], subjects: ["수학", "수학", "수학Ⅰ", "수학Ⅱ"] },
                { name: "영어", grades: [3, 3, null, null], subjects: ["영어", "영어", "", ""] },
                { name: "사회", grades: [3, 4, null, 6], subjects: ["통사", "통사", "", "사회·문화"] },
                { name: "과학", grades: [6, 5, 6, null], subjects: ["통과학", "통과학", "생명Ⅰ", ""] }
              ].map((subject, idx) => {
                const validGrades = subject.grades.map((g, i) => ({ grade: g, index: i })).filter(item => item.grade !== null);

                return (
                  <tr key={idx} className="border-b border-gray-100 dark:border-gray-800 hover:bg-blue-50 dark:hover:bg-blue-900/10 smooth-transition">
                    <td className="py-4 px-4 font-bold text-gray-800 dark:text-gray-200">{subject.name}</td>
                    {subject.grades.map((grade, i) => (
                      <td key={i} className="py-4 px-4 text-center">
                        {grade ? (
                          <div className="flex flex-col items-center gap-1">
                            {subject.subjects[i] && (
                              <span className="text-[10px] font-bold text-gray-500 dark:text-gray-400">
                                {subject.subjects[i]}
                              </span>
                            )}
                            <span className="inline-flex items-center justify-center w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-blue-600 text-white font-bold shadow-lg">
                              {grade}
                            </span>
                          </div>
                        ) : (
                          <span className="text-gray-300 dark:text-gray-600">—</span>
                        )}
                      </td>
                    ))}
                    <td className="py-4 px-4">
                      {validGrades.length > 1 ? (
                        <svg width="100" height="40" className="mx-auto">
                          {validGrades.map((item, i) => {
                            if (i === 0) return null;
                            const prev = validGrades[i - 1];
                            const x1 = 10 + prev.index * 25;
                            const y1 = 35 - (prev.grade - 1) * 5;
                            const x2 = 10 + item.index * 25;
                            const y2 = 35 - (item.grade - 1) * 5;
                            return (
                              <line key={i} x1={x1} y1={y1} x2={x2} y2={y2}
                                stroke="#3b82f6" strokeWidth="2" />
                            );
                          })}
                          {validGrades.map((item, i) => {
                            const x = 10 + item.index * 25;
                            const y = 35 - (item.grade - 1) * 5;
                            return (
                              <g key={i}>
                                <circle cx={x} cy={y} r="3" fill="#3b82f6" />
                                <text x={x} y={y - 6} fontSize="10" fill="#64748b" textAnchor="middle" fontWeight="bold">
                                  {item.grade}
                                </text>
                              </g>
                            );
                          })}
                        </svg>
                      ) : (
                        <span className="text-xs text-gray-400">—</span>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* 진로선택 성취도 상세 팝업 */}
      {achPopupOpen && (
        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setAchPopupOpen(false)}>
          <div className="bg-white dark:bg-gray-800 rounded-3xl p-8 max-w-2xl w-full max-h-[85vh] overflow-y-auto shadow-2xl" onClick={e => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-6">
              <h3 className="text-2xl font-black gradient-text">진로선택 성취도 과목 상세</h3>
              <button onClick={() => setAchPopupOpen(false)} className="p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full transition-colors">
                ✕
              </button>
            </div>

            <div className="space-y-4">
              {achSubjects.length > 0 ? achSubjects.map((subj, idx) => {
                const score = parseFloat(subj.원점수);
                const avg = parseFloat(subj.평균);
                const isAboveAvg = !isNaN(score) && !isNaN(avg) && score >= avg;
                const diff = !isNaN(score) && !isNaN(avg) ? Math.abs(score - avg).toFixed(1) : null;

                return (
                  <div key={idx} className="p-5 rounded-2xl border border-gray-200 dark:border-gray-700 hover:shadow-md transition-shadow bg-gradient-to-r from-gray-50 to-white dark:from-gray-800 dark:to-gray-900">
                    <div className="flex justify-between items-start mb-3">
                      <div>
                        <div className="text-xs text-gray-500 dark:text-gray-400 mb-1">{subj.학년} {subj.학기}</div>
                        <h4 className="text-lg font-bold text-gray-900 dark:text-gray-100">{subj.과목}</h4>
                      </div>
                      <span className="inline-flex items-center justify-center w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-cyan-500 text-white font-bold shadow-lg text-lg">
                        {subj.성취도}
                      </span>
                    </div>

                    <div className="grid grid-cols-3 gap-4 mb-3">
                      <div className="text-center p-3 bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700">
                        <div className="text-xs text-gray-500 dark:text-gray-400 mb-1">원점수</div>
                        <div className="text-xl font-black text-gray-900 dark:text-gray-100">{subj.원점수 || '—'}</div>
                      </div>
                      <div className="text-center p-3 bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700">
                        <div className="text-xs text-gray-500 dark:text-gray-400 mb-1">과목평균</div>
                        <div className="text-xl font-black text-gray-600 dark:text-gray-300">{subj.평균 || '—'}</div>
                      </div>
                      <div className="text-center p-3 bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700">
                        <div className="text-xs text-gray-500 dark:text-gray-400 mb-1">학점</div>
                        <div className="text-xl font-black text-gray-900 dark:text-gray-100">{subj.학점 || 3}</div>
                      </div>
                    </div>

                    {diff && (
                      <div className={`text-center p-3 rounded-lg ${isAboveAvg ? 'bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800' : 'bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800'}`}>
                        <span className={`text-sm font-bold ${isAboveAvg ? 'text-red-600 dark:text-red-400' : 'text-blue-600 dark:text-blue-400'}`}>
                          {isAboveAvg ? '▲' : '▼'} {diff}점 ({isAboveAvg ? '평균 이상' : '평균 이하'})
                        </span>
                      </div>
                    )}
                  </div>
                );
              }) : (
                <div className="text-center py-12 text-gray-400">성취도 과목 데이터가 없습니다.</div>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// 성적 탭
const Grades = ({ student }) => {
  const [year, setYear] = useState("1학년");
  const [sem, setSem] = useState("1학기");

  const filtered = useMemo(() => {
    return (student.성적 || []).filter(g => g.학년 === year && g.학기 === sem);
  }, [student, year, sem]);

  return (
    <div className="glass rounded-3xl p-8">
      <h3 className="text-2xl font-bold mb-6 gradient-text">성적 조회</h3>
      
      <div className="flex flex-wrap gap-3 mb-6">
        {["1학년", "2학년"].map(y => (
          <button key={y} onClick={() => setYear(y)}
            className={`px-6 py-2.5 rounded-full text-sm font-bold smooth-transition ${
              year === y ? 'btn-primary text-white' : 'bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700'
            }`}>
            {y}
          </button>
        ))}
      </div>

      <div className="flex flex-wrap gap-3 mb-8">
        {["1학기", "2학기"].map(s => (
          <button key={s} onClick={() => setSem(s)}
            className={`px-6 py-2.5 rounded-full text-sm font-bold smooth-transition ${
              sem === s ? 'btn-primary text-white' : 'bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700'
            }`}>
            {s}
          </button>
        ))}
      </div>

      <div className="overflow-x-auto">
        <table className="w-full">
          <thead>
            <tr className="border-b-2 border-blue-200 dark:border-blue-800">
              <th className="text-left py-4 px-4 text-sm font-bold text-gray-600 dark:text-gray-300 uppercase">과목</th>
              <th className="text-center py-4 px-4 text-sm font-bold text-gray-600 dark:text-gray-300 uppercase">학점</th>
              <th className="text-right py-4 px-4 text-sm font-bold text-gray-600 dark:text-gray-300 uppercase">원점수</th>
              <th className="text-right py-4 px-4 text-sm font-bold text-gray-600 dark:text-gray-300 uppercase">평균</th>
              <th className="text-center py-4 px-4 text-sm font-bold text-gray-600 dark:text-gray-300 uppercase">등급/성취도</th>
            </tr>
          </thead>
          <tbody>
            {filtered.length > 0 ? filtered.map((g, i) => (
              <tr key={i} className="border-b border-gray-100 dark:border-gray-800 hover:bg-blue-50 dark:hover:bg-blue-900/10 smooth-transition">
                <td className="py-4 px-4 font-semibold text-gray-800 dark:text-gray-200">{g.과목}</td>
                <td className="py-4 px-4 text-center text-gray-600 dark:text-gray-400">{g.학점 || 3}</td>
                <td className="py-4 px-4 text-right font-semibold text-gray-800 dark:text-gray-200">{g.원점수 || '—'}</td>

// 세특 탭
const Seteuk = ({ studentName, subject, setSubject, student }) => {
  const [mdContent, setMdContent] = useState('');
  const [loading, setLoading] = useState(false);
  const [openSections, setOpenSections] = useState({});

  useEffect(() => {
    if (subject === "전체 분석") return;

    setLoading(true);

    // 1. 먼저 JSON 데이터에서 세특 찾기
    const grades = student.성적 || [];
    const subjectSeteuk = grades
      .filter(g => g.과목 && g.과목.includes(subject) && g.세특)
      .map(g => `## ${g.학년} ${g.학기}\n\n${g.세특}`)
      .join('\n\n');

    if (subjectSeteuk) {
      // JSON에 세특이 있으면 사용
      setMdContent(`# ${subject}\n\n${subjectSeteuk}`);
      setLoading(false);
    } else {
      // JSON에 없으면 마크다운 파일 시도
      fetch(`${GITHUB_BASE}${studentName}_세특_${subject}.md`)
        .then(res => res.text())
        .then(text => {
          setMdContent(text);
          setLoading(false);
        })
        .catch(err => {
          console.error(err);
          setMdContent('# 데이터를 불러올 수 없습니다.');
          setLoading(false);
        });
    }
  }, [studentName, subject, student]);

  const sections = useMemo(() => {
    if (!mdContent) return [];
    // ## 로 split (첫 번째 # 제목 제거)
    const parts = mdContent.split(/^## /m).filter(s => s.trim());
    return parts.map(s => {
      const lines = s.split('\n');
      return { title: lines[0].replace(/^# /, ''), content: lines.slice(1).join('\n') };
    });
  }, [mdContent]);

  const 세특분석 = student.세특종합분석 || {};

  return (
    <div className="space-y-6">
      <div className="glass rounded-3xl p-6">
        <div className="flex flex-wrap gap-3">
          {["전체 분석", "국어", "영어", "수학", "과학", "사회", "정보", "교양"].map(s => (
            <button key={s} onClick={() => setSubject(s)}
              className={`px-5 py-2.5 rounded-full text-sm font-bold smooth-transition ${
                subject === s ? 'btn-primary text-white' : 'bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700'
              }`}>
              {s}
            </button>
          ))}
        </div>
      </div>

      {subject === "전체 분석" ? (
        <div className="space-y-6">
          <div className="glass rounded-3xl p-8">
            <h3 className="text-xl font-bold gradient-text mb-4">📊 과목별 종합역량 분석</h3>
            <p className="text-gray-600 dark:text-gray-400 text-sm mb-6">학생의 세부능력 및 특기사항에 나타난 과목군별 핵심 역량과 발전 가능성을 종합 분석한 내용입니다.</p>
          </div>

          {Object.keys(세특분석).length > 0 ? (
            <div className="grid grid-cols-1 gap-6">
              {Object.entries(세특분석).map(([subject, data]) => (
                <div key={subject} className="glass rounded-3xl p-8 hover-lift smooth-transition">
                  <h4 className="text-2xl font-black mb-6 gradient-text">{subject}</h4>

                  {/* 핵심역량 */}
                  <div className="mb-6">
                    <h5 className="text-sm font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-3">핵심역량</h5>
                    <div className="flex flex-wrap gap-2">
                      {data.핵심역량.map((역량, i) => (
                        <span key={i} className="px-3 py-1.5 bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 text-xs font-bold rounded-full border border-blue-200 dark:border-blue-800">
                          {역량}
                        </span>
                      ))}
                    </div>
                  </div>

                  {/* 주요평가 */}
                  <div className="mb-6">
                    <h5 className="text-sm font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-3">주요 평가</h5>
                    <ul className="space-y-3">
                      {data.주요평가.map((평가, i) => (
                        <li key={i} className="flex gap-3 text-sm text-gray-700 dark:text-gray-300 leading-relaxed">
                          <span className="text-blue-500 font-bold mt-1">•</span>
                          <span>{평가}</span>
                        </li>
                      ))}
                    </ul>
                  </div>

                  {/* 발전가능성 */}
                  <div className="p-4 bg-gradient-to-r from-blue-50 to-cyan-50 dark:from-blue-900/20 dark:to-cyan-900/20 rounded-xl border-l-4 border-blue-500">
                    <h5 className="text-xs font-bold text-blue-600 dark:text-blue-400 uppercase tracking-wider mb-2">💡 발전 가능성</h5>
                    <p className="text-sm text-gray-800 dark:text-gray-200 leading-relaxed">{data.발전가능성}</p>
                  </div>
                </div>
              ))}
            </div>
          ) : (
            <div className="glass rounded-3xl p-8 text-center text-gray-400">종합 분석 데이터가 없습니다.</div>
          )}
        </div>
      ) : loading ? (
        <div className="glass rounded-3xl p-12 text-center">
          <div className="animate-pulse text-gray-400">로딩 중...</div>
        </div>
      ) : sections.length > 0 ? (
        <div className="space-y-4">

                <span className="font-bold text-gray-800 dark:text-gray-200">📌 {sec.title}</span>

              </button>

              </div>
            </div>
          ))}
        </div>
      ) : (
        <div className="glass rounded-3xl p-8 text-center text-gray-400">데이터 없음</div>

  );
};

        {/* 헤더 */}
        <header className="glass rounded-3xl p-6 mb-8">
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-4">
              <div className="w-12 h-12 rounded-2xl bg-white flex items-center justify-center shadow-lg p-1">
                <img src="https://i.imgur.com/Mo4ogKc.png" alt="KMLA Logo" className="w-full h-full object-contain" />
              </div>
              <div>
                <h1 className="text-2xl md:text-3xl font-black gradient-text">KMLA Transcript</h1>
                <p className="text-sm text-gray-500 dark:text-gray-400">학교생활기록부 조회 시스템</p>
              </div>
            </div>

            <div className="flex items-center gap-4">
              {/* 다크모드 토글 */}
              <button onClick={() => setDarkMode(!darkMode)}
                className="w-10 h-10 rounded-xl bg-gray-100 dark:bg-gray-800 flex items-center justify-center hover:scale-110 smooth-transition">
                <Icon name={darkMode ? 'sun' : 'moon'} size={20} className="text-gray-600 dark:text-gray-300" />
              </button>

              {/* 학생 선택 */}
              <select value={selectedStudent} onChange={e => setSelectedStudent(e.target.value)}
                className="px-6 py-2.5 rounded-full bg-gradient-to-r from-blue-500 to-blue-600 text-white font-bold text-sm border-none outline-none cursor-pointer shadow-lg hover:shadow-xl smooth-transition">
                {students.map(s => (
                  <option key={s.이름} value={s.이름}>{s.이름}</option>
                ))}
              </select>
            </div>
          </div>
        </header>

        <div className="grid grid-cols-1 lg:grid-cols-4 gap-8">
          {/* 프로필 카드 */}
          <div className="lg:col-span-1">
            <div className="glass rounded-3xl p-8 text-center hover-lift smooth-transition">
              <div className="w-32 h-32 mx-auto mb-6 rounded-full bg-gradient-to-br from-blue-400 to-blue-500 p-1 shadow-xl">
                <div className="w-full h-full rounded-full overflow-hidden bg-gray-100 dark:bg-gray-800">
                  {currentStudent.프로필이미지URL ? (
                    <img src={currentStudent.프로필이미지URL} alt={selectedStudent} className="w-full h-full object-cover" />
                  ) : (
                    <div className="w-full h-full flex items-center justify-center">
                      <Icon name="user" size={48} className="text-gray-400" />
                    </div>
                  )}
                </div>
              </div>

              <h2 className="text-2xl font-black mb-2 gradient-text">{selectedStudent}</h2>
              <p className="text-sm text-blue-500 dark:text-blue-400 font-bold mb-6">{currentStudent.계열 || '인문사회계열'}</p>

              <div className="grid grid-cols-2 gap-3 text-sm">
                <div className="bg-gray-50 dark:bg-gray-800 rounded-xl p-3">
                  <p className="text-gray-500 dark:text-gray-400 text-xs mb-1">학년/반</p>
                  <p className="font-bold text-gray-800 dark:text-gray-200">{currentStudent.학년} {currentStudent.반}</p>
                </div>
                <div className="bg-gray-50 dark:bg-gray-800 rounded-xl p-3">
                  <p className="text-gray-500 dark:text-gray-400 text-xs mb-1">번호</p>
                  <p className="font-bold text-gray-800 dark:text-gray-200">{currentStudent.번호 || '—'}</p>
                </div>
              </div>
            </div>

            {/* 주요 세특 평가 표현 */}
            {currentStudent.highlights && currentStudent.highlights.length > 0 && (
              <div className="glass rounded-3xl p-6 mt-6">
                <h3 className="text-sm font-bold mb-4 gradient-text flex items-center gap-2">
                  <span>⭐</span> 주요 세특 평가 표현
                </h3>
                <div className="space-y-3">
                  {currentStudent.highlights.map((h, i) => (
                    <div key={i} className="bg-gradient-to-r from-blue-50 to-cyan-50 dark:from-blue-900/20 dark:to-cyan-900/20 rounded-xl p-4 border-l-4 border-blue-500">
                      <p className="text-gray-800 dark:text-gray-200 font-semibold text-xs mb-2 leading-relaxed">"{h.text}"</p>
                      <span className="inline-block px-2 py-1 bg-blue-100 dark:bg-blue-800 text-blue-700 dark:text-blue-200 text-[10px] font-bold rounded-full">
                        {h.subject}
                      </span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* 메인 컨텐츠 */}
          <div className="lg:col-span-3 space-y-6">
            {/* 탭 네비게이션 */}
            <div className="glass rounded-3xl p-2">
              <div className="flex gap-2 relative">
                {tabs.map(tab => (
                  <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                    className={`flex-1 px-6 py-3 rounded-2xl text-sm font-bold smooth-transition flex items-center justify-center gap-2 ${
                      activeTab === tab.id ? 'bg-gradient-to-r from-blue-500 to-blue-600 text-white shadow-lg' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800'
                    }`}>
                    <Icon name={tab.icon} size={18} />
                    <span>{tab.name}</span>
                  </button>
                ))}
              </div>
            </div>

            {/* 탭 컨텐츠 */}
            <div>
              {activeTab === 'dashboard' && <Dashboard student={currentStudent} />}
              {activeTab === 'grades' && <Grades student={currentStudent} />}
              {activeTab === 'seteuk' && <Seteuk studentName={selectedStudent} subject={seSubject} setSubject={setSeSubject} student={currentStudent} />}
              {activeTab === 'career' && <Career student={currentStudent} />}
              {activeTab === 'club' && <Club student={currentStudent} />}
              {activeTab === 'autonomous' && <Autonomous student={currentStudent} />}
              {activeTab === 'behavior' && <Behavior student={currentStudent} />}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// 렌더링
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
